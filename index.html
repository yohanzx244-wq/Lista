<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minha Lista de Compras</title>
  
  <!-- Tailwind CSS para design moderno e responsivo -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonte premium Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    /* Suaviza a rolagem no iOS */
    .smooth-scroll {
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-stretch sm:items-center min-h-screen p-0 sm:p-4">

  <!-- Container principal otimizado para tela de celular -->
  <div class="w-full max-w-md bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col h-[100vh] sm:h-[800px] border border-slate-800/80 overflow-hidden relative">
    
    <!-- Cabeçalho Fixo -->
    <header class="bg-slate-900 border-b border-slate-800 p-5 flex-shrink-0">
      <div class="flex items-center gap-3 mb-4">
        <!-- Ícone Sacola de Compras (SVG embutido) -->
        <div class="bg-emerald-500/10 p-2.5 rounded-2xl text-emerald-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white">Minha Lista</h1>
          <p class="text-xs text-slate-400">Toque para marcar como comprado</p>
        </div>
      </div>

      <!-- Barra de Progresso Inteligente -->
      <div id="progress-container" class="hidden">
        <div class="flex justify-between items-center mb-1.5">
          <span id="progress-text" class="text-xs font-semibold text-slate-400">0 de 0 itens</span>
          <span id="progress-percentage" class="text-xs font-bold text-emerald-400">0%</span>
        </div>
        <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-350 ease-out" style="width: 0%"></div>
        </div>
      </div>
    </header>

    <!-- Área de Lista com Rolagem Fluida -->
    <main class="flex-1 overflow-y-auto p-4 space-y-3 smooth-scroll bg-slate-955" id="items-list">
      <!-- Tela de carregamento inicial -->
      <div id="loading-state" class="h-full flex flex-col items-center justify-center text-slate-500 space-y-3 py-12">
        <div class="w-8 h-8 border-3 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs font-medium">Sincronizando com a nuvem...</p>
      </div>

      <!-- Estado vazio (oculto por padrão) -->
      <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-slate-500 space-y-4 py-12">
        <svg class="w-16 h-16 opacity-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <div class="text-center">
          <p class="text-sm font-semibold text-slate-400">Sua lista está vazia</p>
          <p class="text-xs text-slate-500 mt-1">Escreva o que precisa logo abaixo!</p>
        </div>
      </div>

      <!-- Lista de Itens Dinâmica -->
      <ul id="items-ul" class="space-y-2.5"></ul>
    </main>

    <!-- Formulário de Entrada na Base do Celular -->
    <footer class="p-4 bg-slate-900 border-t border-slate-800 flex-shrink-0">
      <form id="add-form" class="flex gap-2.5">
        <input 
          type="text" 
          id="item-input" 
          placeholder="Adicionar novo item..." 
          maxlength="50"
          autocomplete="off"
          class="flex-1 bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
        >
        <button 
          type="submit" 
          class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-5 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-lg"
          aria-label="Adicionar item"
        >
          <!-- Ícone Mais -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </form>
    </footer>

    <!-- Notificação rápida (Toast) -->
    <div id="toast" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-slate-950 px-4 py-2 rounded-full text-xs font-bold shadow-xl flex items-center gap-1.5 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
      <span id="toast-text">Salvo com sucesso</span>
    </div>

  </div>

  <!-- Firebase App e Firestore SDKs -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // 1. Configurações Dinâmicas do Ambiente
    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"demo","projectId":"demo-project"}');
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'lista-compras-simples-celular';

    // Inicialização
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let localItems = [];

    // Elementos DOM
    const itemsUl = document.getElementById('items-ul');
    const addForm = document.getElementById('add-form');
    const itemInput = document.getElementById('item-input');
    const loadingState = document.getElementById('loading-state');
    const emptyState = document.getElementById('empty-state');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressPercentage = document.getElementById('progress-percentage');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');

    // Mostra Toast temporário
    function showToast(message) {
      toastText.innerText = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // 2. Fluxo de Autenticação (Requisito Obrigatório)
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Erro na autenticação:", error);
        loadingState.innerHTML = '<p class="text-red-400 text-xs text-center">Falha ao conectar com o servidor.</p>';
      }
    };

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        startSync(user.uid);
      }
    });

    initAuth();

    // 3. Sincronização em Tempo Real (Firestore)
    function startSync(userId) {
      // Coleção privada e segura do usuário (MANDATÓRIO)
      const itemsCollection = collection(db, 'artifacts', appId, 'users', userId, 'lista');
      
      onSnapshot(itemsCollection, (snapshot) => {
        localItems = [];
        snapshot.forEach((doc) => {
          localItems.push({ id: doc.id, ...doc.data() });
        });

        // Ordena os itens: Não concluídos primeiro, ordenados pelo mais recente
        localItems.sort((a, b) => {
          if (a.completed === b.completed) {
            return b.createdAt - a.createdAt;
          }
          return a.completed ? 1 : -1;
        });

        renderList();
      }, (error) => {
        console.error("Erro ao sincronizar dados:", error);
      });
    }

    // 4. Renderização Dinâmica da Interface
    function renderList() {
      loadingState.classList.add('hidden');
      itemsUl.innerHTML = '';

      if (localItems.length === 0) {
        emptyState.classList.remove('hidden');
        progressContainer.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      progressContainer.classList.remove('hidden');

      let completedCount = 0;

      localItems.forEach((item) => {
        if (item.completed) completedCount++;

        const li = document.createElement('li');
        li.className = `flex items-center justify-between p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] ${
          item.completed 
            ? 'bg-slate-900/30 border-slate-950 opacity-40' 
            : 'bg-slate-800/85 border-slate-700/50 shadow-md'
        }`;

        // Estrutura interna com ações táteis otimizadas
        li.innerHTML = `
          <button class="flex items-center gap-3.5 flex-1 text-left select-none focus:outline-none" data-action="toggle" data-id="${item.id}">
            ${item.completed ? `
              <span class="text-emerald-400 transition-transform duration-150 scale-105">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
              </span>
            ` : `
              <span class="text-slate-500 hover:text-emerald-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                </svg>
              </span>
            `}
            <span class="text-sm font-semibold break-words max-w-[200px] sm:max-w-[250px] ${item.completed ? 'line-through text-slate-500' : 'text-slate-100'}">
              ${escapeHTML(item.name)}
            </span>
          </button>
          
          <button class="p-2 text-slate-500 hover:text-rose-400 active:scale-90 transition-colors focus:outline-none" data-action="delete" data-id="${item.id}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        `;

        itemsUl.appendChild(li);
      });

      // Atualiza progresso
      const total = localItems.length;
      const percent = Math.round((completedCount / total) * 100);
      progressText.innerText = `${completedCount} de ${total} item${total > 1 ? 's' : ''}`;
      progressPercentage.innerText = `${percent}%`;
      progressBar.style.width = `${percent}%`;
    }

    // Escapa texto para evitar problemas de segurança
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // 5. Interações (Adicionar, Concluir e Deletar)
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const val = itemInput.value.trim();
      if (!val || !currentUser) return;

      itemInput.value = '';
      
      try {
        const itemsCollection = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'lista');
        await addDoc(itemsCollection, {
          name: val,
          completed: false,
          createdAt: Date.now()
        });
        showToast("Adicionado à lista");
      } catch (err) {
        console.error("Erro ao salvar:", err);
      }
    });

    // Event Delegation para cliques nos itens
    itemsUl.addEventListener('click', async (e) => {
      const button = e.target.closest('button');
      if (!button || !currentUser) return;

      const action = button.getAttribute('data-action');
      const id = button.getAttribute('data-id');

      if (action === 'toggle') {
        const item = localItems.find(i => i.id === id);
        if (item) {
          try {
            const itemRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'lista', id);
            await updateDoc(itemRef, {
              completed: !item.completed
            });
          } catch (err) {
            console.error(err);
          }
        }
      } else if (action === 'delete') {
        try {
          const itemRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'lista', id);
          await deleteDoc(itemRef);
          showToast("Item removido");
        } catch (err) {
          console.error(err);
        }
      }
    });
  </script>
</body>
</html>
