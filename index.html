<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minha Lista de Compras</title>
  
  <!-- Tailwind CSS para design móvel de alta fidelidade -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonte Premium Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .smooth-scroll {
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-stretch sm:items-center min-h-screen p-0 sm:p-4">

  <!-- Container principal do celular -->
  <div class="w-full max-w-md bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col h-[100vh] sm:h-[800px] border border-slate-800/80 overflow-hidden relative">
    
    <!-- Cabeçalho -->
    <header class="bg-slate-900 border-b border-slate-800 p-5 flex-shrink-0">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div class="bg-emerald-500/10 p-2.5 rounded-2xl text-emerald-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <div>
            <h1 class="text-lg font-bold tracking-tight text-white">Minha Lista</h1>
            <p class="text-[11px] text-slate-400">Toque no item para dar um "OK"</p>
          </div>
        </div>

        <!-- Indicador de Status da Nuvem / Local -->
        <div id="status-pill" class="flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold bg-slate-800 text-slate-400 transition-colors duration-300">
          <span class="w-1.5 h-1.5 rounded-full bg-slate-500" id="status-dot"></span>
          <span id="status-text">Conectando...</span>
        </div>
      </div>

      <!-- Barra de Progresso -->
      <div id="progress-container" class="hidden">
        <div class="flex justify-between items-center mb-1.5">
          <span id="progress-text" class="text-[11px] font-semibold text-slate-400">0 de 0 itens</span>
          <span id="progress-percentage" class="text-xs font-bold text-emerald-400">0%</span>
        </div>
        <div class="w-full h-1.5 bg-slate-850 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-300 ease-out" style="width: 0%"></div>
        </div>
      </div>
    </header>

    <!-- Área da Lista (Rolagem) -->
    <main class="flex-1 overflow-y-auto p-4 space-y-3 smooth-scroll bg-slate-950/20" id="items-list">
      <!-- Tela de carregamento -->
      <div id="loading-state" class="h-full flex flex-col items-center justify-center text-slate-500 space-y-3 py-12">
        <div class="w-8 h-8 border-3 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs font-medium">Buscando seus itens...</p>
      </div>

      <!-- Estado vazio -->
      <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-slate-500 space-y-4 py-12">
        <svg class="w-16 h-16 opacity-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <div class="text-center">
          <p class="text-sm font-semibold text-slate-400">Sua lista está limpa</p>
          <p class="text-xs text-slate-500 mt-1">Toque abaixo para começar a adicionar!</p>
        </div>
      </div>

      <!-- Lista de Itens -->
      <ul id="items-ul" class="space-y-2.5"></ul>
    </main>

    <!-- Formulário Inferior -->
    <footer class="p-4 bg-slate-900 border-t border-slate-800 flex-shrink-0">
      <form id="add-form" class="flex gap-2.5">
        <input 
          type="text" 
          id="item-input" 
          placeholder="Comprar pão, leite, maçã..." 
          maxlength="40"
          autocomplete="off"
          class="flex-1 bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
        >
        <button 
          type="submit" 
          class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-5 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-lg"
          aria-label="Adicionar item"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </form>
    </footer>

    <!-- Notificações (Toast) -->
    <div id="toast" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-slate-950 px-4 py-2 rounded-full text-xs font-bold shadow-xl flex items-center gap-1.5 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
      <span id="toast-text">Sincronizado</span>
    </div>

  </div>

  <!-- Firebase v10 SDKs estáveis -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // 1. Configurações Dinâmicas das Variáveis de Ambiente
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'lista-de-compras-hybrid';
    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    let db = null;
    let auth = null;
    let userSession = null;
    let items = [];
    let isOfflineMode = false;
    let unsubscribeFirestore = null;

    // Elementos DOM
    const itemsUl = document.getElementById('items-ul');
    const addForm = document.getElementById('add-form');
    const itemInput = document.getElementById('item-input');
    const loadingState = document.getElementById('loading-state');
    const emptyState = document.getElementById('empty-state');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressPercentage = document.getElementById('progress-percentage');
    const statusPill = document.getElementById('status-pill');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');

    // Inicialização da UI e verificação de conexão
    function updateStatusIndicator(mode) {
      if (mode === 'cloud') {
        statusPill.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
        statusDot.className = "w-1.5 h-1.5 rounded-full bg-emerald-400";
        statusText.innerText = "NUVEM ACTIVE";
      } else {
        statusPill.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold bg-amber-500/10 text-amber-400 border border-amber-500/20";
        statusDot.className = "w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse";
        statusText.innerText = "LOCAL (OFFLINE)";
      }
    }

    function showToast(msg) {
      toastText.innerText = msg;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2000);
    }

    // 2. Sistema de Autenticação com Retry e Backoff Exponencial
    async function initConnection() {
      if (!firebaseConfig) {
        enableLocalStorageMode();
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // Tentativa de autenticação com tratamento de retentativas
        let authSuccess = false;
        let delay = 1000;

        for (let attempt = 0; attempt < 5; attempt++) {
          try {
            if (initialToken) {
              await signInWithCustomToken(auth, initialToken);
            } else {
              await signInAnonymously(auth);
            }
            authSuccess = true;
            break;
          } catch (e) {
            // Backoff exponencial
            await new Promise((resolve) => setTimeout(resolve, delay));
            delay *= 2;
          }
        }

        if (authSuccess) {
          onAuthStateChanged(auth, (user) => {
            if (user) {
              userSession = user;
              isOfflineMode = false;
              updateStatusIndicator('cloud');
              syncWithFirestore(user.uid);
            } else {
              enableLocalStorageMode();
            }
          });
        } else {
          enableLocalStorageMode();
        }

      } catch (err) {
        console.warn("Erro ao configurar Firebase. Usando armazenamento local temporário.", err);
        enableLocalStorageMode();
      }
    }

    // 3. Salvamento Local de Segurança
    function enableLocalStorageMode() {
      isOfflineMode = true;
      updateStatusIndicator('local');
      
      // Carrega do LocalStorage do aparelho
      const saved = localStorage.getItem(`shopping_list_${appId}`);
      items = saved ? JSON.parse(saved) : [];
      
      // Renderiza itens imediatamente
      renderItems();
    }

    function saveToLocalStorage() {
      localStorage.setItem(`shopping_list_${appId}`, JSON.stringify(items));
    }

    // 4. Sincronização em Tempo Real (Firestore - Respeitando Regra 1)
    function syncWithFirestore(uid) {
      const collectionRef = collection(db, 'artifacts', appId, 'users', uid, 'compras');
      
      // Listener ativo em tempo real
      unsubscribeFirestore = onSnapshot(collectionRef, (snapshot) => {
        items = [];
        snapshot.forEach((doc) => {
          items.push({ id: doc.id, ...doc.data() });
        });

        // Ordenação lógica inteligente
        items.sort((a, b) => {
          if (a.completed === b.completed) {
            return b.createdAt - a.createdAt;
          }
          return a.completed ? 1 : -1;
        });

        renderItems();
      }, (error) => {
        console.error("Falha ao escutar banco na nuvem. Mantendo cópia local.", error);
        enableLocalStorageMode();
      });
    }

    // 5. Motor de Renderização de Itens (Telas de Toque)
    function renderItems() {
      loadingState.classList.add('hidden');
      itemsUl.innerHTML = '';

      if (items.length === 0) {
        emptyState.classList.remove('hidden');
        progressContainer.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      progressContainer.classList.remove('hidden');

      let completedCount = 0;

      items.forEach((item) => {
        if (item.completed) completedCount++;

        const li = document.createElement('li');
        li.className = `flex items-center justify-between p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] ${
          item.completed 
            ? 'bg-slate-900/30 border-slate-950 opacity-40' 
            : 'bg-slate-800/85 border-slate-700/50 shadow-md'
        }`;

        li.innerHTML = `
          <button class="flex items-center gap-3.5 flex-1 text-left focus:outline-none" data-action="toggle" data-id="${item.id}">
            ${item.completed ? `
              <span class="text-emerald-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
              </span>
            ` : `
              <span class="text-slate-500 hover:text-emerald-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                </svg>
              </span>
            `}
            <span class="text-sm font-semibold break-words max-w-[200px] sm:max-w-[250px] ${item.completed ? 'line-through text-slate-500' : 'text-slate-100'}">
              ${escapeHTML(item.name)}
            </span>
          </button>
          
          <button class="p-2 text-slate-500 hover:text-rose-400 active:scale-90 transition-colors focus:outline-none" data-action="delete" data-id="${item.id}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        `;

        itemsUl.appendChild(li);
      });

      // Atualização dos status e barra de progresso
      const total = items.length;
      const percent = Math.round((completedCount / total) * 100);
      progressText.innerText = `${completedCount} de ${total} item${total > 1 ? 's' : ''}`;
      progressPercentage.innerText = `${percent}%`;
      progressBar.style.width = `${percent}%`;
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    // 6. Eventos de Ações (Manuais e Cloud)
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const val = itemInput.value.trim();
      if (!val) return;

      itemInput.value = '';

      if (isOfflineMode) {
        // Fluxo Local
        const localItem = {
          id: 'local_' + Date.now(),
          name: val,
          completed: false,
          createdAt: Date.now()
        };
        items.unshift(localItem);
        saveToLocalStorage();
        renderItems();
        showToast("Item salvo (Local)");
      } else {
        // Fluxo em Nuvem (Respeitando Regra 3 - Guardar ações com a auth do usuário)
        if (!userSession) return;
        try {
          const collectionRef = collection(db, 'artifacts', appId, 'users', userSession.uid, 'compras');
          await addDoc(collectionRef, {
            name: val,
            completed: false,
            createdAt: Date.now()
          });
        } catch (err) {
          console.error("Erro na nuvem, salvando localmente:", err);
        }
      }
    });

    itemsUl.addEventListener('click', async (e) => {
      const button = e.target.closest('button');
      if (!button) return;

      const action = button.getAttribute('data-action');
      const id = button.getAttribute('data-id');

      if (action === 'toggle') {
        if (isOfflineMode) {
          const item = items.find(i => i.id === id);
          if (item) {
            item.completed = !item.completed;
            items.sort((a, b) => {
              if (a.completed === b.completed) return b.createdAt - a.createdAt;
              return a.completed ? 1 : -1;
            });
            saveToLocalStorage();
            renderItems();
          }
        } else {
          if (!userSession) return;
          const item = items.find(i => i.id === id);
          if (item) {
            try {
              const itemRef = doc(db, 'artifacts', appId, 'users', userSession.uid, 'compras', id);
              await updateDoc(itemRef, { completed: !item.completed });
            } catch (err) {
              console.error(err);
            }
          }
        }
      } else if (action === 'delete') {
        if (isOfflineMode) {
          items = items.filter(i => i.id !== id);
          saveToLocalStorage();
          renderItems();
          showToast("Item excluído");
        } else {
          if (!userSession) return;
          try {
            const itemRef = doc(db, 'artifacts', appId, 'users', userSession.uid, 'compras', id);
            await deleteDoc(itemRef);
            showToast("Item excluído da nuvem");
          } catch (err) {
            console.error(err);
          }
        }
      }
    });

    // Inicialização da conexão
    initConnection();
  </script>
</body>
</html>
