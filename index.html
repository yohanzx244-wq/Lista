<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras por Voz</title>
    <!-- Tailwind CSS para Estilização Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Efeito de pulsação suave para o microfone ativo */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .mic-active {
            animation: pulse-ring 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex justify-center items-stretch sm:items-center p-0 sm:p-4">

    <!-- Container do App (React será montado aqui) -->
    <div id="root" class="w-full max-w-md bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col h-screen sm:h-[820px] border border-slate-800 overflow-hidden"></div>

    <!-- React e Babel para rodar tudo diretamente no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SDKs do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot };
    </script>

    <!-- Código do Aplicativo -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configurações do ambiente fornecidas automaticamente ou fallback de demonstração
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"demo","projectId":"demo-project"}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lista-compras-voz-rapida';

        function App() {
            const [user, setUser] = useState(null);
            const [items, setItems] = useState([]);
            const [newItemName, setNewItemName] = useState('');
            const [loading, setLoading] = useState(true);
            const [isListening, setIsListening] = useState(false);
            const [liveTranscript, setLiveTranscript] = useState('');
            const [toastMessage, setToastMessage] = useState(null);
            const [showHelp, setShowHelp] = useState(false);

            const recognitionRef = useRef(null);
            const dbRef = useRef(null);
            const authRef = useRef(null);

            // 1. Inicializar Firebase e Autenticação
            useEffect(() => {
                try {
                    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    
                    authRef.current = auth;
                    dbRef.current = db;

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };

                    initAuth();

                    const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        if (!currentUser) setLoading(false);
                    });

                    return () => unsubscribe();
                } catch (e) {
                    console.error("Erro Firebase:", e);
                    setLoading(false);
                }
            }, []);

            // 2. Escutar atualizações da Lista em tempo real (Firestore)
            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, onSnapshot } = window.FirebaseSDK;

                const itemsCollection = collection(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens');
                const unsubscribe = onSnapshot(itemsCollection, (snapshot) => {
                    const loadedItems = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setItems(loadedItems);
                    setLoading(false);
                }, (err) => {
                    console.error(err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Mostra avisos temporários na tela
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(null), 3000);
            };

            // 3. Gerenciamento de Voz Instantâneo (Web Speech API)
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) return;

                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'pt-BR';

                recognition.onstart = () => {
                    setIsListening(true);
                    setLiveTranscript('Ouvindo...');
                };

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }

                    // Atualiza o texto na tela para feedback visual instantâneo
                    setLiveTranscript(finalTranscript || interimTranscript);

                    if (finalTranscript) {
                        processInstantSpeech(finalTranscript.toLowerCase().trim());
                    }
                };

                recognition.onerror = (e) => {
                    console.error("Erro microfone:", e.error);
                    if (e.error === 'not-allowed') {
                        showToast("Permita o acesso ao microfone nas configurações!");
                    }
                };

                recognition.onend = () => {
                    setIsListening(false);
                    setLiveTranscript('');
                };

                recognitionRef.current = recognition;
            }, [items]); // Atualiza quando os itens mudam para que o comando de excluir use a lista mais recente

            // 4. Processamento Instantâneo das Frases sem Delay
            const processInstantSpeech = async (speechText) => {
                if (!user || !dbRef.current) return;
                const { collection, addDoc, doc, deleteDoc, updateDoc } = window.FirebaseSDK;
                const itemsCollection = collection(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens');

                // Comando de Excluir / Remover
                if (speechText.startsWith('excluir') || speechText.startsWith('remover') || speechText.startsWith('apagar') || speechText.startsWith('tira')) {
                    const cleanItemName = speechText.replace(/^(excluir|remover|apagar|tira|tirar|exclua)\s+(o\s+|a\s+)?/i, '').trim();
                    const matchedItem = items.find(item => item.name.toLowerCase().includes(cleanItemName) || cleanItemName.includes(item.name.toLowerCase()));
                    
                    if (matchedItem) {
                        await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens', matchedItem.id));
                        showToast(`Removido: "${matchedItem.name}"`);
                    } else {
                        showToast(`Não achei "${cleanItemName}" para excluir`);
                    }
                    return;
                }

                // Comando de dar "OK" / Concluído
                if (speechText.startsWith('ok') || speechText.startsWith('comprei') || speechText.startsWith('peguei') || speechText.startsWith('marcar')) {
                    const cleanItemName = speechText.replace(/^(ok|comprei|peguei|marcar|concluir)\s+(o\s+|a\s+)?/i, '').trim();
                    const matchedItem = items.find(item => item.name.toLowerCase().includes(cleanItemName) || cleanItemName.includes(item.name.toLowerCase()));

                    if (matchedItem) {
                        await updateDoc(doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens', matchedItem.id), {
                            purchased: !matchedItem.purchased
                        });
                        showToast(`Status atualizado: "${matchedItem.name}"`);
                    }
                    return;
                }

                // Comando de Adicionar Instantâneo
                // Remove palavras de ativação do início
                let cleanInput = speechText.replace(/^(adicionar|adiciona|bota|coloca|quero comprar|compra|novo item)\s+/i, '');
                
                // Divide por "e" ou por vírgulas para adicionar múltiplos itens simultaneamente
                const possibleItems = cleanInput.split(/,|\se\s+/).map(i => i.trim()).filter(i => i.length > 1);

                for (const itemName of possibleItems) {
                    // Evita duplicar itens idênticos que já estão abertos na lista
                    const alreadyExists = items.some(i => i.name.toLowerCase() === itemName.toLowerCase() && !i.purchased);
                    if (!alreadyExists) {
                        await addDoc(itemsCollection, {
                            name: itemName.charAt(0).toUpperCase() + itemName.slice(1),
                            purchased: false,
                            createdAt: Date.now()
                        });
                    }
                }
                
                if (possibleItems.length > 0) {
                    showToast(`Adicionado: ${possibleItems.join(', ')}`);
                }
            };

            const toggleListening = () => {
                if (!recognitionRef.current) {
                    showToast("Seu celular/navegador não suporta comando de voz.");
                    return;
                }
                if (isListening) {
                    recognitionRef.current.stop();
                } else {
                    recognitionRef.current.start();
                }
            };

            // 5. Métodos Manuais (Adicionar e Deletar)
            const handleAddManual = async (e) => {
                e.preventDefault();
                if (!newItemName.trim() || !user) return;
                const { collection, addDoc } = window.FirebaseSDK;

                try {
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens'), {
                        name: newItemName.trim(),
                        purchased: false,
                        createdAt: Date.now()
                    });
                    setNewItemName('');
                } catch (err) {
                    console.error(err);
                }
            };

            const handleToggleManual = async (item) => {
                if (!user) return;
                const { doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens', item.id), {
                    purchased: !item.purchased
                });
            };

            const handleDeleteManual = async (id) => {
                if (!user) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'users', user.uid, 'itens', id));
            };

            // Ordenar itens da lista
            const sortedItems = useMemo(() => {
                return [...items].sort((a, b) => {
                    if (a.purchased === b.purchased) {
                        return b.createdAt - a.createdAt;
                    }
                    return a.purchased ? 1 : -1;
                });
            }, [items]);

            const completedCount = items.filter(i => i.purchased).length;
            const progress = items.length ? (completedCount / items.length) * 100 : 0;

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center text-slate-400">
                        <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="font-semibold text-sm">Sincronizando lista...</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full">
                    
                    {/* Cabeçalho */}
                    <div className="bg-slate-900 border-b border-slate-800 p-5 flex-shrink-0 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500/10 p-2.5 rounded-2xl text-emerald-400">
                                <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-white flex items-center gap-1.5">
                                    Lista por Voz
                                    <span className="bg-emerald-500/20 text-emerald-400 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase">Instantânea</span>
                                </h1>
                                <p className="text-[11px] text-slate-400">Fale para adicionar ou remover</p>
                            </div>
                        </div>

                        <button 
                            onClick={() => setShowHelp(!showHelp)}
                            className="p-2 text-slate-400 hover:text-white rounded-xl bg-slate-800 hover:bg-slate-750 transition-colors"
                        >
                            <i data-lucide="help-circle" class="w-5 h-5"></i>
                        </button>
                    </div>

                    {/* Ajuda rápida */}
                    {showHelp && (
                        <div className="bg-slate-950/90 p-4 border-b border-slate-850 text-xs text-slate-300 space-y-2 animate-fade-in">
                            <p className="font-bold text-emerald-400">Comandos rápidos de voz:</p>
                            <ul className="list-disc pl-4 space-y-1">
                                <li><strong>Para adicionar:</strong> Fale os itens normalmente (ex: <span className="italic text-slate-100">"Maçã, banana e leite"</span>)</li>
                                <li><strong>Para marcar OK:</strong> Diga <span className="italic text-slate-100">"Ok maçã"</span> ou <span className="italic text-slate-100">"Comprei a banana"</span></li>
                                <li><strong>Para remover:</strong> Diga <span className="italic text-slate-100">"Excluir leite"</span> ou <span className="italic text-slate-100">"Remover maçã"</span></li>
                            </ul>
                        </div>
                    )}

                    {/* Barra de Progresso */}
                    {items.length > 0 && (
                        <div className="bg-slate-900/50 px-6 py-3 border-b border-slate-850 flex items-center justify-between flex-shrink-0">
                            <span className="text-xs font-semibold text-slate-400">
                                {completedCount} de {items.length} itens comprados
                            </span>
                            <div className="w-28 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                    )}

                    {/* Transcrição em Tempo Real */}
                    {isListening && (
                        <div className="bg-emerald-500/10 border-b border-emerald-500/20 px-5 py-3 text-center flex-shrink-0 flex items-center justify-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                            <p className="text-xs text-emerald-300 font-medium italic truncate max-w-full">
                                {liveTranscript}
                            </p>
                        </div>
                    )}

                    {/* Lista de Itens (Scrollable) */}
                    <div className="flex-1 overflow-y-auto p-4 bg-slate-950/40 space-y-2">
                        {items.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-600 py-12">
                                <i data-lucide="mic" class="w-16 h-16 mb-4 opacity-10 animate-pulse text-emerald-400"></i>
                                <p className="text-center text-sm font-medium">Sua lista está limpa.</p>
                                <p className="text-center text-xs text-slate-500 mt-1">Toque no microfone e diga o que deseja comprar!</p>
                            </div>
                        ) : (
                            sortedItems.map((item) => (
                                <div 
                                    key={item.id}
                                    className={`flex items-center justify-between p-3.5 rounded-2xl border transition-all duration-150 ${
                                        item.purchased 
                                            ? 'bg-slate-900/30 border-slate-900 opacity-40' 
                                            : 'bg-slate-900 border-slate-850/80 hover:border-slate-800 shadow-md'
                                    }`}
                                >
                                    <button 
                                        onClick={() => handleToggleManual(item)}
                                        className="flex items-cente
